<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0D0A14" />
  <title>Sus — an AI vibe check</title>
  <meta name="description" content="Swipe Legit or Sus on short-form clips, then learn the tells. A media-literacy game." />

  <!-- PWA / installable -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sus" />

  <!-- Social preview -->
  <meta property="og:title" content="Sus — an AI vibe check" />
  <meta property="og:description" content="Can you spot the fake? Swipe Legit or Sus on short-form clips, then learn the tells." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#0D0A14; --surface:#17121F; --txt:#F6F2FF; --muted:#7E7597;
      --line:rgba(246,242,255,.08); --sus:#FF3D7F; --legit:#2DE2C5;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%}
    body{
      background:radial-gradient(140% 80% at 50% -20%, #1c1530 0%, var(--ink) 60%);
      color:var(--txt); font-family:'Inter',system-ui,-apple-system,sans-serif;
      display:flex; align-items:center; justify-content:center; min-height:100dvh; overflow:hidden;
    }
    #app{
      position:relative; width:100%; max-width:440px; height:100dvh; max-height:900px;
      display:flex; flex-direction:column; overflow:hidden; user-select:none;
      padding:max(env(safe-area-inset-top),14px) 22px max(env(safe-area-inset-bottom),20px);
    }
    @media (min-width:520px){
      #app{height:min(90dvh,860px); border-radius:34px; background:radial-gradient(140% 80% at 50% -10%, #1c1530 0%, var(--ink) 60%);
        box-shadow:0 50px 120px -40px rgba(0,0,0,.85), 0 0 0 1px var(--line)}
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    :focus-visible{outline:2px solid var(--legit);outline-offset:3px;border-radius:12px}

    /* ---------------- INTRO ---------------- */
    .intro{flex:1;display:flex;flex-direction:column;animation:up .5s ease}
    .wm{font-family:'Space Grotesk';font-weight:700;font-size:22px;letter-spacing:-1px;
      background:linear-gradient(100deg,var(--sus),var(--legit));-webkit-background-clip:text;background-clip:text;color:transparent;padding-top:8px}
    .intro .mid{flex:1;display:flex;flex-direction:column;justify-content:center}
    .hero{font-family:'Space Grotesk';font-weight:700;font-size:clamp(38px,11vw,50px);line-height:1.02;letter-spacing:-2.5px;margin:0}
    .hero em{font-style:normal;background:linear-gradient(100deg,var(--sus),var(--legit));-webkit-background-clip:text;background-clip:text;color:transparent}
    .sub{font-size:16px;line-height:1.55;color:#c8c0dd;margin:22px 0 0;max-width:30ch}
    .rail3{display:flex;gap:8px;margin-top:34px}
    .r3{flex:1;display:flex;flex-direction:column;gap:7px;padding:14px 12px;border:1px solid var(--line);border-radius:16px}
    .r3 .e{font-size:20px}
    .r3 b{font-family:'Space Grotesk';font-weight:600;font-size:13.5px}
    .cta{width:100%;padding:19px;border-radius:18px;font-family:'Space Grotesk';font-weight:700;font-size:17px;
      color:var(--ink);background:linear-gradient(100deg,var(--legit),#7cf1dd);transition:transform .12s}
    .cta:active{transform:scale(.985)}
    .cta.pink{background:linear-gradient(100deg,var(--sus),#ff7aa6)}
    .foot{font-family:'Space Mono';font-size:9.5px;color:var(--muted);text-align:center;margin-top:16px;line-height:1.7;letter-spacing:.3px}

    /* ---------------- PLAY (minimal chrome) ---------------- */
    .hud{display:flex;flex-direction:column;gap:9px;padding:8px 0 14px}
    .track{display:flex;gap:4px}
    .seg{height:3px;flex:1;border-radius:3px;background:var(--line);transition:.35s}
    .seg.done{background:var(--muted)}
    .seg.now{background:linear-gradient(90deg,var(--sus),var(--legit))}
    .count{font-family:'Space Mono';font-size:10px;letter-spacing:2px;color:var(--muted);text-align:center}

    .stage{position:relative;flex:1;min-height:0}
    .card{position:absolute;inset:0;border-radius:26px;overflow:hidden;box-shadow:0 24px 50px -20px rgba(0,0,0,.7);will-change:transform}
    .card.peek{transform:scale(.94) translateY(12px);filter:brightness(.55)}
    .card.active{touch-action:pan-y;cursor:grab}
    .card.active.grab{cursor:grabbing}
    .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.2) 0%,transparent 30%,transparent 55%,rgba(0,0,0,.82) 100%)}
    .scene{position:absolute;top:41%;left:50%;transform:translate(-50%,-50%);font-size:112px;filter:drop-shadow(0 12px 30px rgba(0,0,0,.5));opacity:.95}
    .meta{position:absolute;left:20px;right:20px;bottom:22px}
    .handle{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:600;font-size:15px;margin-bottom:7px;text-shadow:0 2px 8px rgba(0,0,0,.6)}
    .handle .lk{font-family:'Space Mono';font-weight:400;font-size:11px;color:rgba(255,255,255,.7)}
    .caption{font-size:14px;line-height:1.45;color:#f3eeff;text-shadow:0 2px 10px rgba(0,0,0,.75)}
    .stamp{position:absolute;top:34px;font-family:'Space Grotesk';font-weight:700;font-size:38px;letter-spacing:1px;
      padding:6px 16px;border-radius:13px;border:3px solid;pointer-events:none;opacity:0}
    .stamp.legit{right:24px;transform:rotate(10deg);color:var(--legit);border-color:var(--legit)}
    .stamp.sus{left:24px;transform:rotate(-10deg);color:var(--sus);border-color:var(--sus)}

    .coach{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 4px;pointer-events:none;z-index:3;animation:fade .5s ease}
    .coach .s{display:flex;flex-direction:column;align-items:center;gap:5px;background:rgba(0,0,0,.42);backdrop-filter:blur(3px);padding:13px 16px;border-radius:18px}
    .coach .s .ar{font-size:27px;font-weight:700}
    .coach .s small{font-family:'Space Mono';font-size:10px;letter-spacing:1px;text-transform:uppercase}
    .coach .l{color:var(--sus)} .coach .r{color:var(--legit)}

    .actions{display:flex;gap:14px;padding:16px 0 4px}
    .act{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:18px 0;border-radius:18px;
      font-family:'Space Grotesk';font-weight:700;font-size:16px;transition:transform .12s,background .12s}
    .act:disabled{opacity:.32}
    .act .ic{display:grid;place-items:center;width:26px;height:26px;border-radius:50%;font-size:13px}
    .act-sus{color:var(--sus);background:rgba(255,61,127,.12)}
    .act-sus .ic{background:rgba(255,61,127,.22)}
    .act-sus:not(:disabled):active{transform:scale(.97);background:rgba(255,61,127,.2)}
    .act-legit{color:var(--legit);background:rgba(45,226,197,.12)}
    .act-legit .ic{background:rgba(45,226,197,.22)}
    .act-legit:not(:disabled):active{transform:scale(.97);background:rgba(45,226,197,.2)}

    /* ---------------- REVEAL ---------------- */
    .sheet-wrap{position:absolute;inset:0;background:rgba(6,4,10,.6);backdrop-filter:blur(4px);display:flex;align-items:flex-end;z-index:10;animation:fade .2s ease}
    .sheet{width:100%;background:var(--surface);border-top:1px solid var(--line);border-radius:28px 28px 0 0;
      padding:14px 22px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -24px 60px rgba(0,0,0,.55);
      animation:rise .42s cubic-bezier(.16,.84,.28,1);max-height:90%;overflow-y:auto}
    .pill{width:38px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 18px}
    .vhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
    .vtag{font-family:'Space Grotesk';font-weight:700;font-size:23px;letter-spacing:-.5px}
    .vtag.good{color:var(--legit)} .vtag.bad{color:var(--sus)}
    .vrun{font-family:'Space Mono';font-size:11px;color:var(--muted)}
    .vtruth{font-size:13.5px;color:var(--muted);margin-bottom:20px}
    .vtruth b{color:var(--txt)}
    .scanhead{display:flex;align-items:center;gap:8px;font-family:'Space Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:13px}
    .scanhead i{width:7px;height:7px;border-radius:50%;background:var(--legit);box-shadow:0 0 10px var(--legit);animation:pulse 1.4s infinite}
    .tells{list-style:none;padding:0;margin:0 0 18px;display:flex;flex-direction:column;gap:11px}
    .tells li{display:flex;gap:12px;font-size:13.5px;line-height:1.4;color:#d9d2ec;font-family:'Space Mono';opacity:0;animation:tellIn .35s ease forwards}
    .tells li .no{color:var(--sus);font-weight:700;flex-shrink:0}
    .tip{background:rgba(246,242,255,.04);border:1px solid var(--line);border-radius:16px;padding:14px 16px;font-size:13.5px;line-height:1.5;color:#e6dffa;margin-bottom:18px}
    .tip b{display:block;font-family:'Space Mono';font-weight:400;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--legit);margin-bottom:6px}
    .next{width:100%;padding:18px;border-radius:17px;font-family:'Space Grotesk';font-weight:700;font-size:15.5px;color:var(--ink);background:linear-gradient(100deg,var(--legit),#7cf1dd);transition:transform .12s}
    .next:active{transform:scale(.985)}

    /* ---------------- RESULTS ---------------- */
    .results{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;animation:up .4s ease;overflow-y:auto}
    .big{font-family:'Space Grotesk';font-weight:700;font-size:clamp(76px,26vw,96px);letter-spacing:-5px;line-height:.9;
      background:linear-gradient(100deg,var(--sus),var(--legit));-webkit-background-clip:text;background-clip:text;color:transparent}
    .big .pct{font-size:38px}
    .rlab{color:var(--muted);font-size:14px;margin:12px 0 26px}
    .grid{display:flex;gap:12px;margin-bottom:22px}
    .cell{flex:1;border:1px solid var(--line);border-radius:18px;padding:18px 8px;display:flex;flex-direction:column;gap:5px}
    .cell b{font-family:'Space Grotesk';font-weight:700;font-size:26px}
    .cell span{font-family:'Space Mono';font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
    .judge{font-family:'Space Grotesk';font-weight:500;font-size:18px;color:#efeaff;line-height:1.3;margin-bottom:22px}
    .blind{margin-bottom:26px}
    .blind .h{font-family:'Space Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .bchip{display:inline-block;margin:4px;padding:8px 14px;border-radius:22px;font-size:12px;background:rgba(255,61,127,.1);border:1px solid rgba(255,61,127,.28);color:#ffc4d9;font-weight:500}
    .rbtns{display:flex;flex-direction:column;gap:11px}
    .ghost{width:100%;padding:16px;border-radius:17px;font-family:'Space Grotesk';font-weight:600;font-size:15px;border:1px solid var(--line);color:var(--txt)}
    .ghost:active{background:rgba(246,242,255,.05)}
    .toast{position:absolute;left:50%;bottom:28px;transform:translateX(-50%) translateY(18px);opacity:0;background:var(--surface);
      border:1px solid var(--line);color:var(--txt);font-size:13px;padding:12px 20px;border-radius:24px;z-index:30;transition:.28s;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @keyframes rise{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes fade{from{opacity:0}to{opacity:1}}
    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tellIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
  (function () {
    "use strict";

    var DECK = [
      { id:1, handle:"@daily_brief_now", caption:"🚨 BREAKING: Officials confirm nationwide policy change effective tomorrow",
        likes:"412K", scene:"📺", gradient:"linear-gradient(160deg,#16213e,#0f3460 60%,#3a0d2e)",
        verdict:"sus", tactic:"Synthetic authority",
        tells:["Anchor blinks at a fixed, unnatural rhythm","Lip movement drifts ~0.2s behind the audio","No masthead, no named outlet, no reporter byline","Studio lighting is flawless — too clean for live news"],
        tip:"Real breaking news is carried by more than one named outlet. Search the claim before you trust the face." },
      { id:2, handle:"@truth.unfiltered", caption:"Happening RIGHT NOW in our streets 🇺🇸 they don't want you to see this",
        likes:"1.1M", scene:"🔥", gradient:"linear-gradient(160deg,#3d2c1e,#5a4632 55%,#1c1c1c)",
        verdict:"sus", tactic:"Out-of-context recycling",
        tells:["Reverse image search dates the footage to 2019","Signage in the background is in another language","Caption swaps the real location for a trending one","Account posts 'happening now' clips daily"],
        tip:"Real footage, fake caption is the most common trick. Check when and where it actually happened." },
      { id:3, handle:"@baileythecorgi", caption:"she finally learned to ring the bell for treats 🐶🔔",
        likes:"88K", scene:"🐕", gradient:"linear-gradient(160deg,#f6c453,#e8833a 60%,#b5651d)",
        verdict:"legit", tactic:null,
        tells:["Consistent lighting, shadows, and motion physics","Creator has years of the same dog, same apartment","No claim, no urgency, nothing to sell you","Casual imperfections a generator wouldn't add"],
        tip:"Not everything is fake. Over-suspicion is its own failure — genuine content has a history and nothing to push." },
      { id:4, handle:"@crypto_wealth_live", caption:"I'm giving back to my fans — send 1 ETH, get 2 back. Link in bio 🤝",
        likes:"204K", scene:"💰", gradient:"linear-gradient(160deg,#1a1a1a,#3d3416 55%,#0d0d0d)",
        verdict:"sus", tactic:"Voice-clone scam",
        tells:["Voice cadence is flat, no natural breaths","Mouth shapes don't match the harder consonants","Classic 'send money, get double' urgency hook","The 'celebrity' never says today's date or anything specific"],
        tip:"If a famous voice asks you to send money to get more back, it's cloned. Always. No exceptions." },
      { id:5, handle:"@realpolitics247", caption:"He actually SAID this on camera and the media is silent 😳",
        likes:"670K", scene:"🎙️", gradient:"linear-gradient(160deg,#241b3a,#3b2a5c 55%,#101725)",
        verdict:"sus", tactic:"Deepfake face-swap",
        tells:["Faint shimmer along the jaw and hairline","Teeth blur into a smear when he speaks fast","Skin tone doesn't quite match the neck","No credible outlet is reporting a quote this explosive"],
        tip:"A shocking quote no real newsroom is covering is a red flag. Watch the edges of the face for warping." },
      { id:6, handle:"@exposed.daily", caption:"Is he okay?? He can barely stand 😟 #concerned",
        likes:"533K", scene:"🥴", gradient:"linear-gradient(160deg,#1f3324,#2f4a35 55%,#12160f)",
        verdict:"sus", tactic:"Cheapfake (speed edit)",
        tells:["Audio pitch is dropped — a tell of slowed footage","Everyone in the background also moves in slow-mo","The original clip runs at normal speed","Framed to imply 'drunk' without saying it"],
        tip:"You don't need AI to lie. Slowing a clip to fake impairment is a 'cheapfake' — check the audio pitch." },
      { id:7, handle:"@studywithlina", caption:"the 2-minute method that finally made flashcards work for me 📚",
        likes:"142K", scene:"📖", gradient:"linear-gradient(160deg,#ff8a7a,#ffd6c9 55%,#f6efe6)",
        verdict:"legit", tactic:null,
        tells:["Real hands, real desk, real natural pauses","Advice is checkable and low-stakes","Creator's back catalogue is consistent","No manufactured outrage or urgency"],
        tip:"Legit content usually asks nothing of your emotions. Calm, specific, and verifiable is a good sign." },
      { id:8, handle:"@world_alerts", caption:"Wildfire reaches the city limits — pray for them 🙏🔥",
        likes:"980K", scene:"🌆", gradient:"linear-gradient(160deg,#5a1e0e,#a83318 55%,#2b0a05)",
        verdict:"sus", tactic:"Synthetic disaster footage",
        tells:["Smoke plume loops in a repeating pattern","Building edges warp and melt at the skyline","No geolocation, no local outlet, no cross-post","Engineered to farm shares through fear"],
        tip:"AI disaster clips spread on fear. Real emergencies have local news, official alerts, and a findable place." },
      { id:9, handle:"@gotcha.clips", caption:"She admits the whole thing was a lie 🤯 (wait for it)",
        likes:"445K", scene:"✂️", gradient:"linear-gradient(160deg,#0e3b3b,#155e5e 55%,#08201f)",
        verdict:"sus", tactic:"Deceptive editing",
        tells:["Hard cut lands mid-sentence, before the point","The question she's answering was removed","Audio jumps — the clip is stitched","Uploader has an obvious axe to grind"],
        tip:"A clip that starts mid-answer is hiding the setup. Find the full, unedited source before you react." },
      { id:10, handle:"@courtside.reels", caption:"buzzer beater from the logo to win game 6 🤯🏀",
        likes:"760K", scene:"🏀", gradient:"linear-gradient(160deg,#1d6b3a,#2fa35a 55%,#0c2f1a)",
        verdict:"legit", tactic:null,
        tells:["Crowd, commentary, and scoreboard all line up","Multiple angles of the same moment exist online","Covered by real sports outlets minutes later","Physics of the ball and players are consistent"],
        tip:"Big real moments get filmed from many angles and picked up fast. Cross-checking confirms it in seconds." }
    ];

    var THRESHOLD = 110;
    var app = document.getElementById("app");
    var S = {};
    function reset(){ S = { screen:"intro", index:0, phase:"swiping", correct:0, answered:0, streak:0, best:0, missed:[], coached:false }; }
    reset();

    function el(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
    function accuracy(){ return S.answered ? Math.round(S.correct/S.answered*100) : 0; }
    function judge(a){ return a>=90?"Elite radar. Fakes don't get past you.":a>=70?"Sharp eye — a few slipped through.":a>=50?"Coin-flip territory. The tells are learnable.":"The feed is winning. Good thing that's fixable."; }
    function dedupe(a){ var s={},o=[]; a.forEach(function(x){ if(!s[x]){s[x]=1;o.push(x);} }); return o; }

    function render(){ app.innerHTML=""; if(S.screen==="intro")return renderIntro(); if(S.screen==="results")return renderResults(); renderPlay(); }

    function renderIntro(){
      var w = el("div","intro");
      w.appendChild(el("div","wm","sus"));
      var mid = el("div","mid");
      mid.appendChild(el("h1","hero","Can you<br>spot the <em>fake</em>?"));
      mid.appendChild(el("p","sub","A feed of short clips. Some real, some faked. Swipe your call — then see exactly how each one was made."));
      var rail = el("div","rail3");
      [["👀","Watch"],["⚖️","Judge"],["🧠","Learn"]].forEach(function(s){
        var r=el("div","r3"); r.appendChild(el("div","e",s[0])); r.appendChild(el("b",null,s[1])); rail.appendChild(r);
      });
      mid.appendChild(rail);
      w.appendChild(mid);
      var cta = el("button","cta","Start the vibe check"); cta.onclick=start; w.appendChild(cta);
      w.appendChild(el("p","foot","Not everything here is fake — that's the point.<br>Built for the UNESCO Youth Hackathon 2026"));
      app.appendChild(w);
    }

    function renderPlay(){
      var card = DECK[S.index];
      // minimal hud: progress + counter only (no score during play)
      var hud = el("div","hud");
      var track = el("div","track");
      DECK.forEach(function(_,i){ track.appendChild(el("span","seg"+(i<S.index?" done":i===S.index?" now":""))); });
      hud.appendChild(track);
      hud.appendChild(el("div","count",String(S.index+1).padStart(2,"0")+" / "+String(DECK.length).padStart(2,"0")));
      app.appendChild(hud);

      var stage = el("div","stage");
      if(DECK[S.index+1]){ var pk=el("div","card peek"); pk.style.background=DECK[S.index+1].gradient; pk.appendChild(el("div","scrim")); stage.appendChild(pk); }
      var c = el("div","card active"); c.style.background=card.gradient; c.tabIndex=0;
      c.setAttribute("role","group"); c.setAttribute("aria-label","Clip from "+card.handle+". Swipe left for Sus, right for Legit.");
      c.appendChild(el("div","scrim"));
      c.appendChild(el("div","scene",card.scene));
      var meta = el("div","meta");
      meta.appendChild(el("div","handle",card.handle+' <span class="lk">❤ '+card.likes+'</span>'));
      meta.appendChild(el("div","caption",card.caption));
      c.appendChild(meta);
      var stL=el("div","stamp legit","LEGIT"), stS=el("div","stamp sus","SUS");
      c.appendChild(stL); c.appendChild(stS);
      if(!S.coached){
        var co=el("div","coach");
        co.innerHTML='<div class="s l"><span class="ar">←</span><small>Sus</small></div><div class="s r"><span class="ar">→</span><small>Legit</small></div>';
        c.appendChild(co);
      }
      stage.appendChild(c);
      app.appendChild(stage);

      var act = el("div","actions");
      var bS=el("button","act act-sus",'<span class="ic">✕</span> Sus');
      var bL=el("button","act act-legit",'<span class="ic">✓</span> Legit');
      bS.onclick=function(){commit("sus");}; bL.onclick=function(){commit("legit");};
      act.appendChild(bS); act.appendChild(bL);
      app.appendChild(act);

      wireDrag(c,stL,stS);
    }

    function wireDrag(c,stL,stS){
      var dragging=false,startX=0,dx=0;
      function down(e){ if(S.phase!=="swiping")return; dragging=true; startX=e.clientX; c.classList.add("grab"); c.setPointerCapture&&c.setPointerCapture(e.pointerId); dismissCoach(c); }
      function move(e){ if(!dragging)return; dx=e.clientX-startX; c.style.transition="none";
        c.style.transform="translateX("+dx+"px) rotate("+(dx*0.05)+"deg)";
        stL.style.opacity=Math.max(0,Math.min(1,dx/THRESHOLD)); stS.style.opacity=Math.max(0,Math.min(1,-dx/THRESHOLD)); }
      function up(){ if(!dragging)return; dragging=false; c.classList.remove("grab");
        if(dx>THRESHOLD)return commit("legit",c); if(dx<-THRESHOLD)return commit("sus",c);
        c.style.transition="transform .3s cubic-bezier(.2,.8,.2,1)"; c.style.transform="translateX(0) rotate(0)";
        stL.style.opacity=0; stS.style.opacity=0; dx=0; }
      c.addEventListener("pointerdown",down); c.addEventListener("pointermove",move);
      c.addEventListener("pointerup",up); c.addEventListener("pointercancel",up);
    }
    function dismissCoach(c){ if(S.coached)return; S.coached=true; var m=c.querySelector(".coach"); if(m)m.style.display="none"; }

    function commit(guess,cardEl){
      if(S.phase!=="swiping")return;
      var card=DECK[S.index], ok=guess===card.verdict;
      S.answered++;
      if(ok){ S.correct++; S.streak++; if(S.streak>S.best)S.best=S.streak; }
      else { S.streak=0; S.missed.push(card.tactic||"Genuine content"); }
      S.phase="revealed";
      buzz(ok?[14]:[26,40,26]);
      cardEl=cardEl||app.querySelector(".card.active");
      if(cardEl){ var d=guess==="legit"?1:-1; cardEl.style.transition="transform .34s cubic-bezier(.2,.8,.2,1)";
        cardEl.style.transform="translateX("+(d*760)+"px) rotate("+(d*20)+"deg)"; }
      app.querySelectorAll(".act").forEach(function(b){ b.disabled=true; });
      showReveal(card,ok);
    }

    function showReveal(card,ok){
      var wrap=el("div","sheet-wrap"), sheet=el("div","sheet");
      sheet.appendChild(el("div","pill"));
      var vh=el("div","vhead");
      vh.appendChild(el("span","vtag "+(ok?"good":"bad"),ok?"Nice catch":"Got you"));
      vh.appendChild(el("span","vrun",(S.streak>=2?S.streak+"🔥  ":"")+S.correct+"/"+S.answered+" correct"));
      sheet.appendChild(vh);
      sheet.appendChild(el("div","vtruth","Actually <b>"+(card.verdict==="sus"?"SUS":"LEGIT")+"</b>"+(card.tactic?" · "+card.tactic:"")));
      sheet.appendChild(el("div","scanhead",'<i></i> forensic readout'));
      var ul=el("ul","tells");
      card.tells.forEach(function(t,i){ var li=el("li",null,'<span class="no">'+String(i+1).padStart(2,"0")+'</span>'+t); li.style.animationDelay=(i*70)+"ms"; ul.appendChild(li); });
      sheet.appendChild(ul);
      sheet.appendChild(el("div","tip","<b>spot it next time</b>"+card.tip));
      var last=S.index+1>=DECK.length;
      var nx=el("button","next",(last?"See your results":"Next clip")+" →"); nx.onclick=next;
      sheet.appendChild(nx);
      wrap.appendChild(sheet); app.appendChild(wrap);
    }

    function next(){
      var w=app.querySelector(".sheet-wrap"); if(w)w.remove();
      if(S.index+1>=DECK.length){ S.screen="results"; render(); }
      else { S.index++; S.phase="swiping"; render(); }
    }

    function renderResults(){
      var acc=accuracy(), r=el("div","results");
      r.appendChild(el("div","big",acc+'<span class="pct">%</span>'));
      r.appendChild(el("div","rlab",S.correct+" of "+S.answered+" clips read correctly"));
      var g=el("div","grid");
      var a=el("div","cell"); a.appendChild(el("b",null,S.best+"🔥")); a.appendChild(el("span",null,"best streak")); g.appendChild(a);
      var b=el("div","cell"); b.appendChild(el("b",null,String(S.missed.length))); b.appendChild(el("span",null,"tricks that fooled you")); g.appendChild(b);
      r.appendChild(g);
      r.appendChild(el("div","judge",judge(acc)));
      if(S.missed.length){ var bl=el("div","blind"); bl.appendChild(el("div","h","your blind spots"));
        dedupe(S.missed).forEach(function(t){ bl.appendChild(el("span","bchip",t)); }); r.appendChild(bl); }
      var btns=el("div","rbtns");
      var sh=el("button","cta pink","Share your score"); sh.onclick=function(){ doShare(acc); };
      var ag=el("button","ghost","Run it back ↺"); ag.onclick=function(){ S.index=0;S.phase="swiping";S.correct=0;S.answered=0;S.streak=0;S.best=0;S.missed=[];S.screen="play";render(); };
      btns.appendChild(sh); btns.appendChild(ag); r.appendChild(btns);
      app.appendChild(r);
    }

    function doShare(acc){
      var text="I scored "+acc+"% spotting fakes on Sus 🔍 Can you beat me?", url=location.href;
      if(navigator.share){ navigator.share({title:"Sus — an AI vibe check",text:text,url:url}).catch(function(){}); return; }
      var payload=text+" "+url;
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(payload).then(function(){toast("Copied — paste it anywhere");},function(){toast(payload);}); }
      else toast(payload);
    }
    function toast(m){ var t=el("div","toast",m); app.appendChild(t); requestAnimationFrame(function(){t.classList.add("show");});
      setTimeout(function(){ t.classList.remove("show"); setTimeout(function(){t.remove();},300); },2200); }
    function buzz(p){ try{ if(navigator.vibrate)navigator.vibrate(p); }catch(e){} }
    function start(){ reset(); S.screen="play"; render(); }

    window.addEventListener("keydown",function(e){
      if(S.screen==="play"&&S.phase==="swiping"){ if(e.key==="ArrowLeft")commit("sus"); else if(e.key==="ArrowRight")commit("legit"); }
      else if(S.screen==="play"&&S.phase==="revealed"){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); next(); } }
      else if(S.screen==="intro"&&(e.key==="Enter"||e.key===" ")){ e.preventDefault(); start(); }
    });

    render();
  })();
  </script>
</body>
</html>
